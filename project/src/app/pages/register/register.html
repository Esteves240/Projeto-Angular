<div class="register-container">
  <h2>Registo</h2>

  <input type="text" placeholder="Username" [(ngModel)]="name" />

  <input type="number" placeholder="Password" [(ngModel)]="password" />

  <button (click)="register()">Registar</button>
  <button routerLink="/login" class="link-btn">Já tenho conta? Login</button>

  @if (error) {
    <p class="error">Este utilizador já existe</p>
  }

  @if (success) {
    <p class="success">Utilizador criado com sucesso</p>
  }
</div>
<app-footer />
