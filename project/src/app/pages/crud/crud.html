<app-menu></app-menu>

<div class="container-fluid pt-3">
  <div class="row">
    <div class="col-12">
      <h1 class="titulo">Gestão de Albuns</h1>
    </div>
  </div>

  <div class="row mt-2">
    <div class="col-12">
      <app-button class="float-end" textButtom="+ adicionar" (click)="openModalAdd()"></app-button>

      <mat-form-field>
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Filtrar por banda" #input />
      </mat-form-field>

      <table class="mat-elevation-z8" mat-table [dataSource]="dataSource" matSort>
        <!-- ID Column -->
        <ng-container matColumnDef="id">
          <th class="th-table" mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td class="td-table" mat-cell *matCellDef="let album">{{ album.id }}</td>
        </ng-container>

        <!-- Name Column -->
        <ng-container matColumnDef="title">
          <th class="th-table" mat-header-cell *matHeaderCellDef mat-sort-header>Nome</th>
          <td class="td-table" mat-cell *matCellDef="let album">{{ album.title }}%</td>
        </ng-container>

        <!-- Band Column -->
        <ng-container matColumnDef="band">
          <th class="th-table" mat-header-cell *matHeaderCellDef mat-sort-header>Banda</th>
          <td class="td-table" mat-cell *matCellDef="let album">{{ album.band }}</td>
        </ng-container>

        <!-- isListened Column -->
        <ng-container matColumnDef="isListened">
          <th class="th-table" mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
          <td class="td-table" mat-cell *matCellDef="let album">
            @if (album.isListened) {
              <mat-icon class="c-primary">check</mat-icon>
            } @else {
              <mat-icon class="c-error">remove</mat-icon>
            }
          </td>
        </ng-container>

        <!-- Icons Column -->
        <ng-container matColumnDef="action">
          <th class="th-table" mat-header-cell *matHeaderCellDef mat-sort-header></th>
          <td class="td-table" mat-cell *matCellDef="let album">
            <mat-icon class="icon-tabela" (click)="openModalView(album)">visibility</mat-icon>
            <mat-icon class="icon-tabela">edit</mat-icon>
            <mat-icon class="icon-tabela">delete</mat-icon>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let album; columns: displayedColumns"></tr>

        <!-- Row shown when there is no matching data. -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell" colspan="4">Nenhum album encontrado.. "{{ input.value }}"</td>
        </tr>
      </table>

      <mat-paginator
        class="shadow-sm"
        [pageSizeOptions]="[5, 10, 25, 100]"
        aria-label="Selecione Albuns por página"
      ></mat-paginator>
    </div>
  </div>
</div>
